<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e0e10"/>
      <stop offset="1" stop-color="#1a1a22"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5fa2"/>
      <stop offset="1" stop-color="#ff9d4d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆角深色底 -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)" stroke="#2a2a35" stroke-width="1"/>

  <!-- 顶部霓虹环（科技感） -->
  <path d="M14 22 Q32 12 50 22" fill="none" stroke="#5ad7ff" stroke-width="1.2" opacity="0.55" filter="url(#glow)"/>

  <!-- 发光播放键 -->
  <path d="M26 24 L46 32 L26 40 Z" fill="url(#play)" filter="url(#glow)"/>

  <!-- 时间线刻度 -->
  <g stroke="#ffb454" stroke-width="1.4" opacity="0.9" stroke-linecap="round">
    <line x1="14" y1="48" x2="14" y2="52"/>
    <line x1="22" y1="48" x2="22" y2="52"/>
    <line x1="30" y1="48" x2="30" y2="52"/>
    <line x1="38" y1="48" x2="38" y2="52"/>
    <line x1="46" y1="48" x2="46" y2="52"/>
  </g>
  <!-- 时间线游标 -->
  <line x1="30" y1="46" x2="30" y2="54" stroke="#ff5fa2" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
</svg>
